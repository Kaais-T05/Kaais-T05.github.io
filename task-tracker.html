<main class="task-page">
  <div class="task-shell">
    <section class="hero">
      <h1>Task Tracker</h1>
      <p class="subtitle">TRACK TASKS, DEADLINES, AND PROGRESS IN ONE PLACE</p>
    </section>

    <section class="card">
      <form id="task-form" class="task-form">
        <div class="form-group">
          <label for="task-input">Task</label>
          <input type="text" id="task-input" placeholder="Enter a task" required />
        </div>

        <div class="form-group">
          <label for="due-date-input">Due Date</label>
          <input type="date" id="due-date-input" />
        </div>

        <button type="submit" class="btn">Add Task</button>
      </form>
    </section>

    <section class="card">
      <h2>Tasks</h2>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="not-started">Not Started</button>
        <button class="filter-btn" data-filter="in-progress">In Progress</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <ul id="task-list" class="task-list"></ul>

      <div class="actions">
        <button id="clear-completed" class="btn btn-outline">Clear Completed</button>
      </div>
    </section>

    <div class="back-link">
      <a href="index.html">← Back to Portfolio</a>
    </div>
  </div>
</main>
